<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>D·CAMP 4~5F 대관 투어 안내 매뉴얼</title>
<meta name="description" content="D·CAMP 마포 4~5층 대관 공간 투어 및 운영 안내 매뉴얼">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#fafaf9;--bg2:#f5f5f4;--bg3:#e7e5e4;--card:#ffffff;
--text:#1c1917;--text2:#57534e;--text3:#a8a29e;
--border:#e7e5e4;--border2:#d6d3d1;
--accent:#dc2626;--accent2:#fef2f2;
--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--shadow2:0 4px 12px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.6;
}
.wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border)}
header h1{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
header h1 span{color:var(--accent)}
header p{font-size:13px;color:var(--text3);font-weight:400}
.map-section{margin:24px 0 0;position:relative}
.map-grid{display:grid;grid-template-columns:1fr;gap:14px}
.map-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.map-card-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:12px}
.map-card-title{font-size:15px;font-weight:900;letter-spacing:-.2px}
.map-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.map-chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap}
.map-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:.3px}
svg{display:block;width:100%;height:auto}
.room{cursor:pointer}
.room rect{transition:all .2s ease}
.room:hover rect{filter:brightness(1.08)}
.nav{
  display:flex;gap:6px;margin:16px 0;flex-wrap:wrap;position:sticky;top:0;z-index:10;
  background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(6px);
  padding:10px 0;border-bottom:1px solid transparent
}
.nav.stuck{border-bottom-color:var(--border)}
.nav button{
  padding:7px 16px;font-size:12px;font-weight:700;border-radius:100px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s;
  font-family:inherit;white-space:nowrap
}
.nav button:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.nav button.on{color:#fff;border-color:transparent;box-shadow:var(--shadow)}
.space-panel{animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.space-header{display:flex;align-items:center;gap:12px;padding:20px 0 12px;border-bottom:2px solid var(--border)}
.space-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.space-header h2{font-size:18px;font-weight:900;letter-spacing:-.3px}
.space-header .badge{font-size:10px;padding:3px 10px;border-radius:100px;font-weight:700;letter-spacing:.5px}
.space-header .sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:1px}
.section{margin:16px 0 0}
.section-title{
  font-size:14px;font-weight:700;color:var(--text);padding:12px 0;border-bottom:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none
}
.section-title::before{
  content:'';display:inline-block;width:0;height:0;border-left:5px solid var(--text3);
  border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s;flex-shrink:0
}
.section-title.open::before{transform:rotate(90deg)}
.section-body{overflow:hidden;max-height:0;transition:max-height .3s ease;padding:0}
.section-body.open{max-height:12000px;padding:8px 0}
.item{font-size:13px;line-height:1.9;color:var(--text2);padding:2px 0 2px 20px;position:relative}
.item::before{content:'';position:absolute;left:6px;top:12px;width:5px;height:5px;border-radius:50%;background:var(--border2)}
.item.warn{color:var(--accent);font-weight:500}
.item.warn::before{background:var(--accent)}
.paragraph{font-size:13px;line-height:1.9;color:var(--text2);padding:2px 0}
.table-wrap{overflow:auto;margin:10px 0 2px;border:1px solid var(--border);border-radius:14px;background:var(--card)}
.info-table{width:100%;border-collapse:collapse;font-size:12px}
.info-table th,.info-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top;text-align:left}
.info-table th{background:var(--bg2);font-weight:800;color:var(--text)}
.info-table tr:last-child td{border-bottom:0}
.info-table td:first-child{font-weight:700;color:var(--text);white-space:nowrap;min-width:120px}
.note-box{margin:12px 0 4px;padding:12px 14px;border-radius:14px;border:1px solid #fecaca;background:var(--accent2);color:#7f1d1d;font-size:12px;line-height:1.75}
.note-box.neutral{border-color:var(--border);background:var(--bg2);color:var(--text2)}
.note-box strong{display:block;font-size:12px;font-weight:800;margin-bottom:4px;color:inherit}
.route-summary{margin:12px 0 10px;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,#fff7ed,#ffedd5);border:1px solid #fdba74;box-shadow:var(--shadow)}
.route-label{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:#fff;color:#9a3412;font-size:11px;font-weight:800;letter-spacing:.2px}
.route-label::before{content:"→";font-weight:900}
.route-copy{margin-top:8px;font-size:14px;line-height:1.75;color:#7c2d12;font-weight:800;letter-spacing:-.2px}
.route-subcopy{margin-top:6px;font-size:12px;line-height:1.75;color:#9a3412}
.route-steps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0}
.route-step{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 12px 10px;box-shadow:var(--shadow)}
.route-step-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.route-step-no{width:24px;height:24px;border-radius:999px;background:#111827;color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.route-step-title{font-size:12px;font-weight:900;color:var(--text);letter-spacing:-.2px}
.route-step-body{font-size:12px;line-height:1.7;color:var(--text2)}
.guide-card{margin:12px 0 4px;border:1px solid var(--border);border-radius:16px;background:var(--card);overflow:hidden;box-shadow:var(--shadow)}
.guide-card.route-guide{overflow:hidden;border-color:#d9dee8}
.guide-visual{border-bottom:1px solid var(--border)}
.guide-visual img{display:block;width:100%;height:auto}
.guide-meta{padding:12px 14px}
.guide-title{font-size:16px;font-weight:900;letter-spacing:-.3px}
.guide-text{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.7}
.guide-keypoints{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.guide-chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2)}
.guide-image-link{display:block;text-decoration:none}
.guide-image-hint{margin-top:8px;font-size:12px;color:var(--text3);text-align:right}
.footer{text-align:center;padding:32px 0 0;border-top:1px solid var(--border);margin-top:32px}
.footer p{font-size:11px;color:var(--text3)}
@media (max-width:640px){
  .wrap{padding:16px 12px 48px}
  header{padding:24px 0 18px}
  header h1{font-size:22px}
  .map-wrap{padding:14px}
  .space-header{align-items:flex-start}
  .route-steps{grid-template-columns:1fr}
}
</style>
</head>

let current="overview";

function escapeHtml(value){
  return String(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function renderItems(items){
  return items.map(it=>{
    const w=String(it).startsWith("⚠️");
    return `<div class="item${w?" warn":""}">${escapeHtml(it)}</div>`;
  }).join("");
}

function renderParagraphs(text){
  const lines=Array.isArray(text)?text:[text];
  return lines.map(line=>`<p class="paragraph">${escapeHtml(line)}</p>`).join("");
}

function renderTable(table){
  const head=table.headers.map(h=>`<th>${escapeHtml(h)}</th>`).join("");
  const rows=table.rows.map(row=>{
    return `<tr>${row.map(cell=>`<td>${escapeHtml(cell)}</td>`).join("")}</tr>`;
  }).join("");
  return `<div class="table-wrap"><table class="info-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderNote(section){
  const lines=Array.isArray(section.note)?section.note:[section.note];
  const cls=section.noteStyle==="neutral"?"note-box neutral":"note-box";
  const title=section.noteTitle?`<strong>${escapeHtml(section.noteTitle)}</strong>`:"";
  return `<div class="${cls}">${title}${lines.map(line=>`<div>${escapeHtml(line)}</div>`).join("")}</div>`;
}

function renderTrashGuide(){
  return `<div class="route-summary">
    <div class="route-label">현장 안내 멘트</div>
    <div class="route-copy">"오른쪽 아래 엘리베이터 타시고, 지하 3층에서 내리신 뒤 바로 아래 문을 지나 진행 방향 기준 오른쪽 정면으로 가시면 됩니다."</div>
    <div class="route-subcopy">이미지를 눌러 크게 볼 수 있게 반영했습니다.</div>
  </div>
  <div class="guide-card route-guide">
    <div class="guide-visual">
      <a class="guide-image-link" href="./trash-route_1_trimmed.png" target="_blank" rel="noopener">
        <img src="./trash-route_1_trimmed.png" alt="쓰레기장 동선 안내 이미지">
      </a>
    </div>
  </div>`;
}

function renderSectionContent(section){
  let html="";
  if(section.text) html+=renderParagraphs(section.text);
  if(section.table) html+=renderTable(section.table);
  if(section.items) html+=renderItems(section.items);
  if(section.note) html+=renderNote(section);
  if(section.figure==="trash-guide") html+=renderTrashGuide();
  return html;
}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  NAV.forEach(n=>{
    const b=document.createElement("button");
    b.textContent=n.label;
    if(current===n.id){
      b.className="on";
      b.style.background=n.c;
      b.style.borderColor=n.c;
    }
    b.onclick=()=>{
      current=n.id;
      renderAll();
    };
    nav.appendChild(b);
  });
}

function renderContent(){
  const el=document.getElementById("content");
  const d=SPACES[current];
  if(!d){el.innerHTML="";return;}
  let html=`<div class="space-panel">
    <div class="space-header">
      <div class="space-icon" style="background:${d.iconBg}">${d.icon}</div>
      <div>
        <h2>${escapeHtml(d.name)} <span class="badge" style="background:${d.badgeBg};color:${d.badgeC}">${escapeHtml(d.tag)}</span></h2>
        <div class="sub">${escapeHtml(d.sub)}</div>
      </div>
    </div>`;

  d.sections.forEach((section,index)=>{
    html+=`<div class="section">
      <div class="section-title${index===0?" open":""}" data-open="${index===0}" onclick="toggleSection(this)">${escapeHtml(section.t)}</div>
      <div class="section-body${index===0?" open":""}">${renderSectionContent(section)}</div>
    </div>`;
  });

  html+=`</div>`;
  el.innerHTML=html;
}

function renderAll(){
  renderNav();
  renderContent();
}

window.toggleSection=function(el){
  el.classList.toggle("open");
  const body=el.nextElementSibling;
  if(body) body.classList.toggle("open");
};

document.querySelectorAll(".room").forEach(room=>{
  room.addEventListener("click",()=>{
    current=room.dataset.id;
    renderAll();
    document.getElementById("nav").scrollIntoView({behavior:"smooth",block:"start"});
  });
});

const navEl=document.getElementById("nav");
const observer=new IntersectionObserver(([entry])=>{
  navEl.classList.toggle("stuck",!entry.isIntersecting);
},{threshold:[1],rootMargin:"-1px 0px 0px 0px"});
observer.observe(navEl);

renderAll();
</script>
</body>
</html>
